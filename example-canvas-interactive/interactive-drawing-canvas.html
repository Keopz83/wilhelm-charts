<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Drawing on Canvas Chart</title>
    <link rel="stylesheet" href="interactive-drawing-canvas.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">Interactive Chart with Drawing Tools</h1>
        
        <div class="controls">
            <button id="selectBtn" class="active">Select</button>
            <button id="lineBtn">Draw Trendline</button>
            <button id="hlineBtn">Horizontal Line</button>
            <button id="clearBtn">Clear Drawings</button>
        </div>
        
        <div class="chart-wrapper">
            <canvas id="chartCanvas" width="800" height="400"></canvas>
            <canvas id="drawCanvas" width="800" height="400"></canvas>
        </div>
        
        <div class="info" id="info">Click "Draw Trendline" and drag on the chart to draw</div>
    </div>

    <script src="interactive-drawing-canvas.js"></script>
</body>
</html>
