<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart example on canvas from scratch</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="controls">
        <label for="ticker">Ticker:</label>
        <input type="text" id="ticker" value="GOOGL" placeholder="Enter ticker (e.g., AAPL, MSFT, TSLA)">
        <button id="loadBtn">Load Chart</button>
        <span id="status"></span>
    </div>

    <canvas id="chart" width="900" height="400"></canvas>

    <script src="chart-api/chart-config.js"></script>
    <script src="chart-api/line-config.js"></script>
    <script src="chart-api/draw-grid.js"></script>
    <script src="chart-api/axis.js"></script>
    <script src="chart-api/draw-chart.js"></script>
    <script src="chart-api/mouse-action.js"></script>
    <script src="stock-data-fetcher.js"></script>
    <script src="index.js"></script>

</body>
</html>
