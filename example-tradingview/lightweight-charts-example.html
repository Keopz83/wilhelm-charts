<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Lightweight Charts Example</title>
    <link rel="stylesheet" href="lightweight-charts-example.css">
</head>
<body>
    <div class="container">
        <h1>TradingView Lightweight Charts</h1>
        <p class="subtitle">Professional financial charts with candlesticks, volume, and indicators</p>
        
        <div class="controls">
            <div class="control-group">
                <label>Chart Type:</label>
                <button id="candlestickBtn" class="active">Candlestick</button>
                <button id="lineBtn">Line</button>
                <button id="areaBtn">Area</button>
            </div>
            <div class="control-group">
                <label>Indicators:</label>
                <button id="toggleMA">Toggle SMA(20)</button>
                <button id="toggleVolume">Toggle Volume</button>
            </div>
        </div>
        
        <div id="chart"></div>
        
        <div class="info" id="info">
            <strong>Features:</strong> Real-time performance, crosshair, zoom/pan with mouse wheel
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Open</div>
                <div class="stat-value" id="open">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">High</div>
                <div class="stat-value" id="high">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Low</div>
                <div class="stat-value" id="low">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Close</div>
                <div class="stat-value" id="close">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Volume</div>
                <div class="stat-value" id="volume">--</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="lightweight-charts-example.js"></script>
</body>
</html>
